  /v1/items:
    get:
      tags:
      - Items
      summary: List Items
      operationId: listItems
      parameters:
      - name: start
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
          title: Start
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 100
          minimum: 1
          default: 25
          title: Limit
      - name: itemType
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Itemtype
      - name: collectionKey
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Collectionkey
      - name: tag
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Tag
      - name: includeAttachments
        in: query
        required: false
        schema:
          type: boolean
          default: false
          title: Includeattachments
      - name: includeNotes
        in: query
        required: false
        schema:
          type: boolean
          default: false
          title: Includenotes
      - name: sort
        in: query
        required: false
        schema:
          type: string
          pattern: ^(dateAdded|dateModified|title)$
          default: dateAdded
          title: Sort
      - name: direction
        in: query
        required: false
        schema:
          type: string
          pattern: ^(asc|desc)$
          default: desc
          title: Direction
      - name: X-Zotero-API-Key
        in: header
        required: true
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Zotero-Api-Key
