      operationId: getHealth
      parameters:
      - name: X-Zotero-API-Key
        in: header
        required: true
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Zotero-Api-Key
      responses:
        '200':
          description: Successful Response
